<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Crackk AI — AI Mock Interviews Tailored to Your Resume & Job</title>
    <meta
      name="description"
      content="Practice a realistic technical interview with an AI voice interviewer. Crackk AI builds a mock interview from your resume and the job description, then gives you a detailed, evidence-based report with per-skill scores."
    />
    <meta name="application-name" content="Crackk AI" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://crackk.ai/" />
    <meta name="theme-color" content="#4f46e5" />

    <!-- Open Graph (link previews: WhatsApp, LinkedIn, Slack, …) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Crackk AI" />
    <meta property="og:url" content="https://crackk.ai/" />
    <meta
      property="og:title"
      content="Crackk AI — AI Mock Interviews Tailored to Your Resume & Job"
    />
    <meta
      property="og:description"
      content="Practice a realistic technical interview with an AI voice interviewer, tailored to your resume and the job posting. Get an evidence-based report with per-skill scores."
    />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="Crackk AI — AI Mock Interviews Tailored to Your Resume & Job"
    />
    <meta
      name="twitter:description"
      content="Practice a realistic technical interview with an AI voice interviewer, tailored to your resume and the job posting. Get an evidence-based report with per-skill scores."
    />

    <!-- Structured data for search engines -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Crackk AI",
        "url": "https://crackk.ai/",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Web",
        "description": "AI-conducted mock technical interviews. Upload your resume and the job description, do a live voice interview with an AI interviewer, and receive a detailed, evidence-based report.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
